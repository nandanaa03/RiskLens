<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RiskLens | Health Risk Map</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<div class="dashboard">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">

        <div class="sidebar-top">

            <h2>Risk<span>Lens</span></h2>

            <div class="menu">

                <a href="dashboard.html">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>

                <a href="analytics.html">
                    <i class="fa-solid fa-chart-line"></i> Analytics
                </a>

                <a class="active" href="map.html">
                    <i class="fa-solid fa-map"></i> Risk Map
                </a>

                <a href="states.html">
                    <i class="fa-solid fa-city"></i> States
                </a>

            </div>

        </div>

        <div class="sidebar-bottom">
            © 2026 RiskLens AI
        </div>

    </aside>

    <!-- ================= MAIN ================= -->
    <main class="main">

        <!-- TOP BAR -->
        <div class="topbar">

            <div>
                <h1>Health Risk Map</h1>
                <p>Geospatial visualization of NFHS-5 health risk index</p>
            </div>

        </div>

        <!-- LEGEND -->
        <div class="legend">

            <div class="legend-item">
                <div class="legend-color low"></div>
                Low Risk
            </div>

            <div class="legend-item">
                <div class="legend-color medium"></div>
                Moderate Risk
            </div>

            <div class="legend-item">
                <div class="legend-color high"></div>
                High Risk
            </div>

            <div class="legend-item">
                <div class="legend-color critical"></div>
                Critical Risk
            </div>

        </div>

        <!-- MAP -->
        <div class="map-wrapper">

            <div id="map"></div>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            RiskLens • Interactive GIS Health Surveillance System
        </div>

    </main>

</div>

<!-- MAP JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="js/map.js"></script>

</body>

</html>
